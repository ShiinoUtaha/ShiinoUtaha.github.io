favicon = "/favicon.svg"
# last_updated is auto-set to the build date (see next.config.ts / Footer.tsx).
# Set a value here only if you want to override it manually.

[author]
name = "Wei Liang"
title = "PhD Student"
institution = "China Economics and Management Academy, Central University of Finance and Economics"
